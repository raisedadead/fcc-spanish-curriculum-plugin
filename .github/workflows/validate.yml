name: Validate Marketplace Structure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Ensure jq is available
        run: command -v jq || (sudo apt-get update -qq && sudo apt-get install -y jq)

      # validate.sh must be committed with the executable bit set
      - name: Run validation
        run: ./validate.sh
